version: "3.9"

services:

  # =======================
  # DATABASES
  # =======================

  auth-db:
    image: mysql:8.0
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${AUTH_DB}
    volumes:
      - auth-db-data:/var/lib/mysql


  patient-db:
    image: mysql:8.0
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${PATIENT_DB}
    volumes:
      - patient-db-data:/var/lib/mysql



  # =========================
  # KAFKA
  # =========================
  kafka:
    image: bitnamilegacy/kafka:latest

    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - ALLOW_PLAINTEXT_LISTENER=yes


  # =========================
  # AUTH SERVICE
  # =========================

  auth-service:
    build: ./auth-service
    restart: on-failure
    environment:

      SERVER_PORT: 8084

      SPRING_DATASOURCE_URL: jdbc:mysql://${AUTH_DB_SERVICE}:3306/${AUTH_DB}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      - auth-db


  # =========================
  # PATIENT SERVICE
  # =========================

  patient-service:
    build: ./patient-service
    restart: on-failure
    environment:

      SPRING_DATASOURCE_URL: jdbc:mysql://${PATIENT_DB_SERVICE}:3306/${PATIENT_DB}
      SPRING_DATASOURCE_USERNAME: ${PATIENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ROOT_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      SERVER_PORT: 8081

      GRPC_SERVER_PORT: ${GRPC_PATIENT_SERVICE_PORT}
      GRPC_BILLING_SERVICE_HOST: billing-service
      GRPC_BILLING_SERVICE_PORT: ${GRPC_BILLING_SERVICE_PORT}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: org.apache.kafka.common.serialization.StringSerializer
      SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: org.apache.kafka.common.serialization.ByteArraySerializer

    depends_on:
      - patient-db
      - kafka
      - billing-service


  # =========================
  # BILLING SERVICE
  # =========================

  billing-service:
    build: ./billing-service
    restart: on-failure
    environment:

      SERVER_PORT: 8082

      GRPC_SERVER_PORT: ${GRPC_BILLING_SERVICE_PORT}


  # =========================
  # ANALYTICS SERVICE
  # =========================

  analytics-service:
    build: ./analytics-service
    restart: on-failure
    environment:

      SERVER_PORT: 8083

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
      SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.apache.kafka.common.serialization.ByteArrayDeserializer

    depends_on:
      - kafka

  # =========================
  # API GATEWAY
  # =========================

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    restart: on-failure
    environment:
      SERVER_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8084
    depends_on:
      - auth-service
      - patient-service
      - billing-service


# =========================
# VOLUMES
# =========================

volumes:
  auth-db-data:
  patient-db-data:


# =========================
# NETWORK
# =========================

networks:
  default:
    name: application-network
    driver: bridge