syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.grpc.billing";


service BillingService {
  rpc GetBillingInfo (BillingRequest) returns (BillingResponse);
}

message BillingRequest {
  string user_id = 1;
}

message BillingResponse {
  string user_id = 1;
  double amount_due = 2;
  string due_date = 3;
}