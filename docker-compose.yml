services:

  mysql:
    image: mysql:8.0
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql



  patient-service:
    build: patient-service
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${RELATIONAL_DB_HOST}:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
      GRPC_SERVER_PORT: ${GRPC_PATIENT_SERVICE_PORT}
      GRPC_BILLING_SERVICE_HOST: billing-service
      GRPC_BILLING_SERVICE_PORT: ${GRPC_BILLING_SERVICE_PORT}
    depends_on:
      - mysql

  billing-service:
    build: billing-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      GRPC_SERVER_PORT: ${GRPC_BILLING_SERVICE_PORT}

volumes:
  mysql-data:

networks:
  default:
    name: application-network
    driver: bridge